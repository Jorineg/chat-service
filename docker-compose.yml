services:
  chat-service:
    build: .
    container_name: ibhelm-chat-service
    restart: unless-stopped
    ports:
      - "8200:8200"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    networks:
      - supabase_default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  sandbox-build:
    build:
      context: ./sandbox
    image: ibhelm-sandbox:latest
    profiles:
      - build

networks:
  supabase_default:
    external: true
